name: Update Types

on:
    schedule:
        - cron: "0 * * * *"
    workflow_dispatch:
        inputs:
            force:
                description: "Skip hash check and force generation"
                type: boolean
                default: false

permissions:
    contents: write
    id-token: write

jobs:
    update_types:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install Bun
              uses: oven-sh/setup-bun@v1
              with:
                  bun-version: 1.1.34

            - name: Install dependencies
              run: bun install

            - id: cicd
              name: Get hash from schema
              run: bun cicd ${{ github.event.inputs.force == 'true' && '--force' || '' }}

            - name: Generate types
              run: bun generate

            - name: Prepare to JSR publish
              run: bun jsr

            - name: Commit and Push changes
              uses: EndBug/add-and-commit@v9
              with:
                  message: "release v${{ steps.cicd.outputs.version }}"

            - id: changelog
              name: Generate changelog
              run: bun scripts/generate-changelog.ts

            - name: Publish package to JSR
              run: bunx jsr publish
              continue-on-error: true

            - name: Publish package to NPM
              run: bun publish --access public
              continue-on-error: true
              env:
                  NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: GitHub Release
              continue-on-error: true
              uses: ncipollo/release-action@v1
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  tag: v${{ steps.cicd.outputs.version }}
                  name: v${{ steps.cicd.outputs.version }}
                  body: ${{ steps.changelog.outputs.changelog }}
                  draft: false
                  prerelease: false
                  generateReleaseNotes: true
